# ==========================================
# MACROS (Variables for easy configuration)
# ==========================================
ext_if = "pppoe0"                # The external (WAN) interface used by your ISP
int_if = "igc0"                  # The internal (LAN) interface for your local network
local_net = $int_if:network      # Dynamically calculates your LAN subnet (e.g., 192.168.90.0/24)

# ==========================================
# TABLES (Lists of IP addresses)
# ==========================================
# Martians: IPs that should never exist on the public internet. 
# 192.168/16 is removed here because it's likely used on your LAN side.
table <martians> { 0.0.0.0/8 10.0.0.0/8 127.0.0.0/8 169.254.0.0/16 \
                   172.16.0.0/12 192.0.0.0/24 192.0.2.0/24 224.0.0.0/3 \
                   198.18.0.0/15 198.51.100.0/24 203.0.113.0/24 }

# Bruteforce: A dynamic list of IPs that have been blocked for hitting SSH too hard.
# 'persist' keeps the table in memory even if it's empty.
table <bruteforce> persist

# ==========================================
# GLOBAL OPTIONS
# ==========================================
set block-policy drop            # Silently drop packets (stealth) instead of sending a 'Reset'
set loginterface $ext_if         # Gather packet/byte statistics for the WAN interface
set skip on lo0                  # Ignore all filtering on the loopback (local system processes)

# ==========================================
# TRAFFIC SHAPING (FQ-CoDel)
# ==========================================
# 'bandwidth' triggers the modern FQ-CoDel scheduler to prevent 'Bufferbloat' (lag during downloads)
queue outq on $ext_if bandwidth 190M flows 1024 qlimit 1024 default
queue inq on $int_if bandwidth 190M flows 1024 qlimit 1024 default

# ==========================================
# NORMALIZATION & NAT
# ==========================================
# scrub: Cleans up malformed packets. 
# max-mss 1440: Vital for PPPoE; reduces packet size to fit through the 8-byte PPPoE header overhead.
match in all scrub (no-df random-id max-mss 1440)

# NAT: Translates LAN IPs to your single Public WAN IP. 
# (egress:0) ensures NAT stays active even if your WAN IP changes.
match out on egress inet from $local_net to any nat-to (egress:0)

# ==========================================
# FILTERING HIERARCHY
# ==========================================
block all                        # Default Deny: Everything is forbidden unless explicitly allowed below

# Antispoof: Blocks packets claiming to be from 'us' but arriving on the wrong interface.
antispoof quick for { egress $ext_if $int_if }

# Martians: Block traffic from/to non-routable public IPs on the WAN interface.
block in quick on egress from <martians> to any
block return out quick on egress from any to <martians>

# Bruteforce: Immediately drop any IP that landed in our automated ban list.
block in quick from <bruteforce>

# ==========================================
# REQUIRED: ICMP (Network Health)
# ==========================================
# Pass Ping (echoreq), MTU discovery (unreach), and Traceroute (timex).
# Without 'unreach', PPPoE connections will randomly hang on certain websites.
pass in inet proto icmp all icmp-type { echoreq, unreach, timex }
pass out inet proto icmp all

# ==========================================
# INTERNAL INTERFACE RULES (LAN Side)
# ==========================================
# DHCP: Allow LAN clients to request IP addresses from the router.
pass in quick on $int_if inet proto udp from $local_net to $int_if port { 67, 68 } label "DHCP"

# Squid: Allow LAN clients to reach the proxy service if running.
pass in quick on $int_if inet proto tcp from $local_net to $int_if port 3128 label "Squid"

# DNS: Allow LAN clients to query Unbound on the router.
pass in quick on $int_if inet proto { tcp, udp } from $local_net to $int_if port 53 label "DNS-Local"

# NTP: Allow LAN clients to sync time with the router.
pass in quick on $int_if inet proto udp from $local_net to $int_if port 123 label "NTP-Local"

# Internet Access: Allow LAN clients to reach any destination on the internet.
pass in quick on $int_if inet from $local_net to any label "LAN-to-WAN"

# ==========================================
# EXTERNAL INTERFACE RULES (WAN Side)
# ==========================================
# DROP REFLECTION ATTACKS: Immediately drop traffic from source ports 
# used in amplification attacks (DNS, Chargen, SSDP).
block in quick on $ext_if proto udp from any port { 53, 19, 1900 } to any port 123 \
    label "INT-REFLECT"

# SSH: Allow external login, but ban IPs that try to connect more than 3 times in 60 seconds.
# 1. pass in quick on $ext_if: Allow matching packets immediately on the WAN.
# 2. inet proto tcp: Only allow IPv4 TCP traffic (the protocol SSH uses).
# 3. from any to $ext_if port 22: Allow the public internet to reach the 
#    router's WAN IP on the standard SSH port (22).
# 4. keep state (...): Advanced state tracking to identify attackers:
#    - max-src-conn-rate 3/60: Limits any single IP to 3 *new* connection 
#      attempts within a 60-second window. This is perfect for humans but 
#      stops automated "password guessing" bots.
#    - overload <bruteforce>: If an IP exceeds the rate limit (4th attempt 
#      within a minute), it is automatically added to the <bruteforce> table.
#    - flush global: When an IP is added to the overload table, the firewall 
#      immediately kills all existing connections from that IP. It doesn't 
#      just stop new ones; it kicks the attacker off completely.
# 5. label "SSH": Tags the traffic so you can see attempt stats via 
#    'pfctl -s labels'.
# To see banned IPs: 'pfctl -t bruteforce -T show'

pass in quick on $ext_if inet proto tcp from any to $ext_if port 22223 \
    keep state (max-src-conn-rate 3/60, overload <bruteforce> flush global) label "SSH"

# Public NTP: Allow the world to use your NTP server.
# 1. pass in quick: Allow matching packets immediately and stop processing rules.
# 2. inet proto udp: Only allow IPv4 UDP traffic (the protocol NTP uses).
# 3. from any to port 123: Allow any IP in the world to reach our NTP daemon.
# 4. keep state (...): Security tracking for every unique connection:
#    - max-src-nodes 100000: Limits the total number of unique remote IP addresses 
#      tracked in the firewall's memory to 100,000. This protects the router's 
#      RAM from being exhausted by a massive botnet flood.
#    - max-src-states 10: Limits a single remote IP to 10 simultaneous active 
#      connections. Genuine NTP clients usually only need 1; 10 allows for 
#      NAT'd users or heavy syncs while blocking "state exhaustion" attacks.
#    - max-src-conn-rate 15/10: A rate-limiter that blocks any IP sending more 
#      than 15 NTP packets every 10 seconds. This is a "sweet spot" that allows 
#      legitimate clients to "burst" sync at startup but prevents your server 
#      from being used as a high-volume tool in a DDoS amplification attack.
# 5. label "NTP-Public": Tags traffic for visibility in 'pfctl -s labels'.

pass in quick on $ext_if inet proto udp from any to port 123 \
    keep state (max-src-nodes 30000, max-src-states 10, max-src-conn-rate 15/10) \
    label "NTP-Public"

# ==========================================
# OUTBOUND RULES
# ==========================================
# Force Encrypted DNS: Block the router/clients from using standard unencrypted Port 53 outbound.
# (Note: Requires your Unbound to be configured for DNS-over-TLS on port 853).
# 1. Allow Unbound (the router) to talk to upstream resolvers over TLS (Port 853)
pass out quick on $ext_if proto tcp to any port 853 label "DNS-over-TLS"

# 2. Block all unencrypted DNS (Port 53) outbound to the internet
# This prevents devices from bypassing your Unbound filters.
block out quick on $ext_if proto { tcp, udp } to any port 53 label "BLOCK-UNENCRYPTED-DNS"

# General Outbound: Allow the OpenBSD server itself to reach the internet for updates/syncing.
pass out quick inet keep state


# EOF
